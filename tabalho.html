<!DOCTYPE html>
<html>
<body>

<h2>JavaScript if .. else</h2>

<p>A time-based greeting:</p>

<p id="demo"></p>

<script>
const time = 18;
let greeting;
if (time > 18) {
  greeting = "Maior de idade";
} else {
  greeting = "Menor de idade";
}
document.getElementById("demo").innerHTML = greeting;
</script>

</body>
</html>
